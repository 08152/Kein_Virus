<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Deep Search Engine (DuckDuckGo-Mode)</title>
    <!-- Verknüpfung mit der CSS-Designdatei -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Die funktionale Seitenleiste -->
    <div class="sidebar">
        <div class="nav-group">
            <button class="btn new-chat-btn" onclick="resetChat()">+ Neuer Chat</button>
            
            <!-- Suchverlauf-Überschrift und dynamischer Container -->
            <div style="font-size: 11px; color: #666; font-weight: bold; text-transform: uppercase; margin-top: 15px; padding-left: 12px;">Suchverlauf</div>
            <div class="history-container" id="historyBox"></div>
        </div>
        
        <!-- Die Live-Uhr im System -->
        <div class="live-clock-box">
            <div id="liveDate">Lade Datum...</div>
            <div class="live-time" id="liveTime">00:00:00</div>
        </div>

        <div class="version-tag">AI Search Engine v3.0</div>
    </div>

    <!-- Haupt-Chat-Bereich -->
    <div class="main-container">
        <div class="chat-header">KI Deep-Search Engine <span class="sub-header">● DuckDuckGo Core</span></div>
        <div class="chat-messages" id="chatBox">
            <div class="message-row ai"><div class="message-box">Bereit mit unzerstörbarer DuckDuckGo-Suche! Nutze das <strong>„+“-Symbol</strong> unten, um Funktionen zu steuern oder deine Chats lokal zu sichern!</div></div>
        </div>
        
        <!-- Eingabebereich und ausklappbares Plus-Menü -->
        <div class="input-area">
            <div class="input-wrapper">
                <!-- Das Plus-Symbol zum Öffnen des Menüs -->
                <button class="plus-btn" id="plusBtn" onclick="toggleMenu()">+</button>
                
                <!-- Das 3-Knopf-Steuerungsmenü -->
                <div class="attach-menu" id="attachMenu">
                    <button class="menu-btn active" id="btnDeepSearch" onclick="toggleDeepSearch()">
                        Deep Search 🔍 <div class="status-dot"></div>
                    </button>
                    <button class="menu-btn" id="btnLongAnswer" onclick="toggleLongAnswer()">
                        Long Answer 📝 <div class="status-dot"></div>
                    </button>
                    <button class="menu-btn action-trigger" onclick="exportChat()">
                        Datei Erstellung 💾 <span>→</span>
                    </button>
                </div>

                <!-- Text-Eingabefeld -->
                <input type="text" id="userInput" placeholder="Schreibe eine Nachricht..." onkeydown="if(event.key === 'Enter') handleSend()">
            </div>
        </div>
    </div>

    <!-- Skripte laden (Such-Logik MUSS vor der Chat-Steuerung geladen werden) -->
    <script src="1.js"></script>
    <script src="script.js"></script>
</body>
</html>
